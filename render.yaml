services:
  - type: web
    name: gaian-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RPC_URL
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: gaian-frontend
    runtime: static
    rootDir: .
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CONTRACT_ADDRESS
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
